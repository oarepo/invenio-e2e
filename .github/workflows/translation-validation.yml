# Periodic translation validation against upstream Invenio packages.
# Requires invenio-i18n >= 3.5.0 in the Python environment.

name: Translation Validation

on:
  push:
    branches: [main, master, i18n-service-wrapper]
  pull_request:
    branches: [main, master, i18n-service-wrapper]
  workflow_dispatch:
    inputs:
      packages:
        description: "Package to validate"
        required: false
        default: "invenio-app-rdm"

jobs:
  translation-validation:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install dependencies
        uses: ./.github/actions/install_dependencies
        with:
          python_version: ${{ matrix.python-version }}

      - name: Clone Invenio packages
        run: |
          git clone https://github.com/inveniosoftware/invenio-app-rdm.git
          git clone https://github.com/inveniosoftware/invenio-rdm-records.git

      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install Python dependencies with UV
        run: |
          source $HOME/.cargo/env
          uv venv --python ${{ matrix.python-version }}
          uv pip install "invenio-i18n>=3.5.0"
          uv pip install -e ./invenio-app-rdm
          uv pip install -e ./invenio-rdm-records

      - name: Collect translations
        env:
          I18N_OUTPUT_DIR: translations
          PYTHON: .venv/bin/python
        run: pnpm run build-translations -- -l de

      - name: Validate translations
        env:
          I18N_OUTPUT_DIR: translations
          PYTHON: .venv/bin/python
        run: pnpm run validate-translations

      - name: Upload validation reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: translation-reports-${{ matrix.python-version }}
          path: |
            translations/validation-report.json
          retention-days: 30
